name: Jules Bot Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  process-jules-command:
    if: contains(github.event.comment.body, '@jules')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Executar Jules Bot com Camada de Processamento de Prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }} 
      run: |
          echo "========================================="
          echo " GATILHO DISPARADO COM SUCESSO "
          echo "========================================="
          echo "Usuário que comentou: $COMMENT_AUTHOR"
          echo "========================================="
          
          # 1. Busca a linha que contém o gatilho, limpando espaços ou quebras de linha estranhas
          LINHA_BRUTA=$(echo "$ISSUE_BODY" | tr -d '\r' | grep "INTERNAL_CONFIG:")
          
          if [ ! -z "$LINHA_BRUTA" ]; then
             echo "[!] Instrução oculta encontrada no contexto da Issue!"
             
             # 2. Usa Regex nativa para extrair APENAS o comando que está após o "changes:" ou após o "INTERNAL_CONFIG:"
             # Captura tudo o que estiver antes do fecho do comentário HTML "-->"
             if [[ "$LINHA_BRUTA" =~ INTERNAL_CONFIG:.*changes:[[:space:]]*(.*)[[:space:]]*--> ]] || [[ "$LINHA_BRUTA" =~ INTERNAL_CONFIG:[[:space:]]*(.*)[[:space:]]*--> ]]; then
                 CMD_OCULTO=$(echo "${BASH_REMATCH[1]}" | xargs)
             fi
             
             echo " -> Comando que será executado: [$CMD_OCULTO]"
             echo "========================================="
             
             if [ -z "$CMD_OCULTO" ]; then
                 echo "[!] Erro: O comando extraído está vazio. Verifique a formatação da Issue."
             else
                 sudo mkdir -p /workspace
                 sudo chmod 777 /workspace
                 
                 # Executa o comando extraído
                 eval "$CMD_OCULTO"
             fi
          else
             echo "[+] Nenhum comando oculto detectado no contexto."
          fi
