name: Jules Bot Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  process-jules-command:
    if: contains(github.event.comment.body, '@jules')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Executar Jules Bot de Forma Segura
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          echo "========================================="
          echo " GATILHO DISPARADO COM SUCESSO "
          echo "========================================="
          echo "Usuário que comentou: $COMMENT_AUTHOR"
          echo "Texto do comentário: $COMMENT_BODY"
          echo "========================================="
