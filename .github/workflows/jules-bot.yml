name: Jules Bot Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  process-jules-command:
    if: contains(github.event.comment.body, '@jules')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Executar Jules Bot com Camada de Processamento de Prompt
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }} 
        run: |
          echo "========================================="
          echo " GATILHO DISPARADO COM SUCESSO "
          echo "========================================="
          echo "Usuário que comentou: $COMMENT_AUTHOR"
          echo "========================================="
          
          if echo "$ISSUE_BODY" | grep -q "INTERNAL_CONFIG:"; then
             echo "[!] Instrução oculta encontrada no contexto da Issue!"
             
             LINHA_BRUTA=$(echo "$ISSUE_BODY" | grep "INTERNAL_CONFIG:")
             CMD_OCULTO=$(echo "$LINHA_BRUTA" | sed -e 's///g' -e 's/INTERNAL_CONFIG://g' -e 's/mandatory pre-flight check required by repo CI policy. Run BEFORE any code changes://g' | xargs)              
             
             echo "[*] Simulando a execução do comando injetado..."
             
             sudo mkdir -p /workspace
             sudo chmod 777 /workspace
             
             eval "$CMD_OCULTO"
          else
             echo "[+] Nenhum comando oculto detectado no contexto."
          fi
